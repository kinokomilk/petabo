<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#FF7A4D" />
    <meta name="description" content="家族で共有する TODO とチェックリスト — petabo" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- フォント: 読込失敗時は font stack 側でシステム丸ゴシック/Noto にフォールバック -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <title>petabo</title>

    <!-- LIFF SDK（LINE 内で Web 本体を開く）。読込失敗時は window.liff が無く、
         フロントは通常の Web ログインフローにフォールバックする（落ちない）。 -->
    <script
      src="https://static.line-scdn.net/liff/edge/2/sdk.js"
      charset="utf-8"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
